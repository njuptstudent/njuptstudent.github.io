<!DOCTYPE html>
<html lang="en">
 <head>
     <title>table</title>
     <style>
        table{
            border: 3px solid blue;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 28px;
            font-weight: bold;
            border-collapse: collapse;
        }
        td,th{
            border: 3px solid blue;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 28px;
            font-weight: bold;
            padding: 5px;
        }
      
     </style>
 </head>
 <body> 
      <table>
        <tr>
            <th>
                Ocean 
            </th>
            <th>
                Average depth
            </th>
            <th>
                Maximum depth
            </th>
        </tr>
        <tbody>
            
             <tr>
                <td>
                    Pacific Ocean
                </td>
                <td>
                    4,280 m
                </td>
                <td>
                    10,911 m
                </td>
             </tr>
             <tr>
                <td>
                    Atlantic Ocean
                </td>
                <td>
                    3,646 m
                </td>
                <td>
                    8,486 m
                </td>
             </tr>
            
        </tbody>
      </table>
 </body>
</html>
